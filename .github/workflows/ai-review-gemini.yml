name: Gemini Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"

concurrency:
  group: gemini-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-code-review:
    name: Gemini Code Review
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review pull request
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_REVIEW_MODEL: ${{ vars.GEMINI_REVIEW_MODEL || 'gemini-2.5-flash' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- ai-review-gemini -->';
            const apiKey = process.env.GEMINI_API_KEY;
            const model = process.env.GEMINI_REVIEW_MODEL;

            if (!apiKey) {
              core.warning('GEMINI_API_KEY secret is not configured. Skipping Gemini code review.');
              return;
            }

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const reviewableFiles = files
              .filter((file) => file.status !== 'removed')
              .filter((file) => file.patch)
              .slice(0, 30);

            if (reviewableFiles.length === 0) {
              core.info('No reviewable text diff found.');
              return;
            }

            const diff = reviewableFiles
              .map((file) => [
                `File: ${file.filename}`,
                `Status: ${file.status}`,
                'Patch:',
                file.patch,
              ].join('\n'))
              .join('\n\n---\n\n')
              .slice(0, 60000);

            function collectDocs(dir) {
              if (!fs.existsSync(dir)) {
                return [];
              }

              return fs.readdirSync(dir, { withFileTypes: true })
                .flatMap((entry) => {
                  const fullPath = path.join(dir, entry.name);
                  if (entry.isDirectory()) {
                    return collectDocs(fullPath);
                  }
                  if (!entry.isFile() || !/\.(md|mdx|txt)$/i.test(entry.name)) {
                    return [];
                  }
                  return [fullPath];
                });
            }

            const docsRoot = path.join(process.env.GITHUB_WORKSPACE, 'docs');
            const docsContext = collectDocs(docsRoot)
              .sort()
              .slice(0, 20)
              .map((filePath) => {
                const relativePath = path.relative(process.env.GITHUB_WORKSPACE, filePath);
                const content = fs.readFileSync(filePath, 'utf8').slice(0, 8000);
                return `Document: ${relativePath}\n${content}`;
              })
              .join('\n\n---\n\n')
              .slice(0, 40000);

            const prompt = `
            You are reviewing a GitHub pull request.

            Review goals:
            - Find correctness bugs, security risks, missing validation, broken edge cases, and test gaps.
            - Read the docs context and check whether the diff follows the documented project rules, conventions, and requirements.
            - When a finding depends on documentation, cite the relevant docs path.
            - Prioritize actionable issues over style preferences.
            - Do not invent problems when the diff does not provide enough evidence.
            - Write the review in Korean.
            - Keep the review concise.

            Response format:
            ## Gemini Code Review
            ### Summary
            - ...

            ### Findings
            - [severity] file:line - issue and suggested fix

            ### Test Suggestions
            - ...

            If there are no meaningful findings, say so clearly and only mention residual risks.

            Pull request title:
            ${context.payload.pull_request.title}

            Pull request body:
            ${context.payload.pull_request.body || '(empty)'}

            Docs context:
            ${docsContext || '(no docs found)'}

            Diff:
            ${diff}
            `;

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                contents: [
                  {
                    role: 'user',
                    parts: [{ text: prompt }],
                  },
                ],
              }),
            });

            if (!response.ok) {
              const message = await response.text();
              core.warning(`Gemini API request failed: ${response.status} ${message}`);
              return;
            }

            const result = await response.json();
            const review = result.candidates?.[0]?.content?.parts
              ?.map((part) => part.text || '')
              .join('\n')
              || 'Gemini review result was empty.';

            const body = `${marker}\n${review}\n\n---\nGenerated by Gemini Code Review workflow.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const previous = comments.find((comment) => comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
            }